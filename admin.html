<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 리베 피아노</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .admin-header h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        /* Login Form */
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .login-form h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Admin Content */
        .admin-content {
            display: none;
        }

        .admin-content.active {
            display: block;
        }

        .upload-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 40px;
        }

        .upload-section h2 {
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 40px;
            border: 2px dashed var(--primary-color);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: var(--bg-light);
        }

        .file-input-label.has-file {
            border-color: #27ae60;
            background: #f0fff4;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 8px;
        }

        .preview-video {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 8px;
        }

        .file-size-info {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 10px;
            text-align: center;
        }

        .file-size-info.error {
            color: #e74c3c;
        }

        /* Gallery Management */
        .gallery-management {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .gallery-management h2 {
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .admin-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .admin-gallery-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .admin-gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .admin-gallery-item-info {
            padding: 15px;
        }

        .admin-gallery-item-info h4 {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .admin-gallery-item-info p {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .delete-btn {
            width: 100%;
            padding: 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .logout-btn {
            position: fixed;
            top: 90px;
            right: 20px;
            padding: 10px 20px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 100px 15px 40px;
            }

            .upload-section,
            .gallery-management {
                padding: 25px 20px;
            }

            .admin-gallery-grid {
                grid-template-columns: 1fr;
            }

            .logout-btn {
                top: 70px;
                right: 15px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header id="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">Liebe Piano</h1>
                <nav class="nav-desktop">
                    <ul>
                        <li><a href="index.html#home">홈</a></li>
                        <li><a href="gallery.html">갤러리</a></li>
                        <li><a href="admin.html" class="active">관리자</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="admin-container">
        <!-- Login Form -->
        <div id="loginSection">
            <div class="login-form">
                <h2>관리자 로그인</h2>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="관리자 비밀번호를 입력하세요">
                </div>
                <button class="btn" onclick="login()">로그인</button>
                <div id="loginMessage"></div>
            </div>
        </div>

        <!-- Admin Content -->
        <div id="adminContent" class="admin-content">
            <button class="logout-btn" onclick="logout()">로그아웃</button>

            <div class="admin-header">
                <h1>갤러리 관리</h1>
            </div>

            <div id="message"></div>

            <!-- Upload Section -->
            <div class="upload-section">
                <h2>이미지/영상 업로드</h2>
                <form id="uploadForm" onsubmit="uploadImage(event)">
                    <div class="file-input-wrapper">
                        <input type="file" id="imageFile" accept="image/*,video/*" onchange="previewFile(event)">
                        <label for="imageFile" class="file-input-label" id="fileLabel">
                            <p style="margin:0; color: var(--primary-color); font-size: 18px;">📷 🎥</p>
                            <p style="margin:10px 0 0 0;">클릭하여 이미지 또는 영상 선택</p>
                            <p style="margin:5px 0 0 0; font-size: 13px; color: var(--text-light);">최대 25MB</p>
                        </label>
                        <img id="preview" class="preview-image" style="display:none;">
                        <video id="videoPreview" class="preview-video" controls style="display:none;"></video>
                        <p id="fileSizeInfo" class="file-size-info" style="display:none;"></p>
                    </div>

                    <div class="form-group">
                        <label for="title">제목 (선택)</label>
                        <input type="text" id="title" placeholder="제목 입력">
                    </div>

                    <div class="form-group">
                        <label for="description">설명 (선택)</label>
                        <textarea id="description" placeholder="설명 입력"></textarea>
                    </div>

                    <button type="submit" class="btn" id="uploadBtn">업로드</button>
                </form>
            </div>

            <!-- Gallery Management -->
            <div class="gallery-management">
                <h2>업로드된 콘텐츠</h2>
                <div id="adminGallery" class="admin-gallery-grid">
                    <div style="text-align:center; padding:40px; grid-column: 1/-1;">
                        콘텐츠를 불러오는 중...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://liebe-piano-gallery.tjmds99.workers.dev';
        let adminPassword = null;

        // Login
        function login() {
            const password = document.getElementById('password').value;
            if (!password) {
                showLoginMessage('비밀번호를 입력하세요', false);
                return;
            }

            adminPassword = password;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').classList.add('active');
            loadAdminGallery();
        }

        // Logout
        function logout() {
            adminPassword = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminContent').classList.remove('active');
            document.getElementById('password').value = '';
        }

        // Preview file (image or video)
        function previewFile(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('preview');
            const videoPreview = document.getElementById('videoPreview');
            const fileSizeInfo = document.getElementById('fileSizeInfo');
            const fileLabel = document.getElementById('fileLabel');

            // Hide both previews first
            preview.style.display = 'none';
            videoPreview.style.display = 'none';
            fileSizeInfo.style.display = 'none';

            if (!file) {
                fileLabel.classList.remove('has-file');
                return;
            }

            // Check file size (25MB limit)
            const maxSize = 25 * 1024 * 1024; // 25MB
            const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);

            fileSizeInfo.style.display = 'block';
            if (file.size > maxSize) {
                fileSizeInfo.textContent = `파일 크기: ${fileSizeMB}MB (최대 25MB 초과!)`;
                fileSizeInfo.classList.add('error');
                fileLabel.classList.remove('has-file');
                return;
            } else {
                fileSizeInfo.textContent = `파일 크기: ${fileSizeMB}MB`;
                fileSizeInfo.classList.remove('error');
            }

            fileLabel.classList.add('has-file');

            // Preview based on file type
            if (file.type.startsWith('video/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    videoPreview.src = e.target.result;
                    videoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // Upload image or video
        async function uploadImage(event) {
            event.preventDefault();

            const fileInput = document.getElementById('imageFile');
            const file = fileInput.files[0];

            if (!file) {
                showMessage('파일을 선택해주세요', false);
                return;
            }

            // Check file size (25MB limit)
            const maxSize = 25 * 1024 * 1024;
            if (file.size > maxSize) {
                showMessage('파일 크기가 25MB를 초과합니다', false);
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '업로드 중...';

            try {
                const response = await fetch(`${API_URL}/api/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminPassword}`
                    },
                    body: formData
                });

                if (response.status === 401) {
                    showMessage('권한이 없습니다. 올바른 비밀번호로 다시 로그인하세요.', false);
                    setTimeout(logout, 2000);
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    const fileType = result.file_type === 'video' ? '영상' : '이미지';
                    showMessage(`${fileType}가 성공적으로 업로드되었습니다!`, true);
                    document.getElementById('uploadForm').reset();
                    document.getElementById('preview').style.display = 'none';
                    document.getElementById('videoPreview').style.display = 'none';
                    document.getElementById('fileSizeInfo').style.display = 'none';
                    document.getElementById('fileLabel').classList.remove('has-file');
                    loadAdminGallery();
                } else {
                    showMessage('업로드 실패: ' + (result.error || '알 수 없는 오류'), false);
                }
            } catch (error) {
                showMessage('업로드 중 오류가 발생했습니다: ' + error.message, false);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '업로드';
            }
        }

        // Load admin gallery
        async function loadAdminGallery() {
            try {
                const response = await fetch(`${API_URL}/api/images`);
                const items = await response.json();

                const container = document.getElementById('adminGallery');

                if (items.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:40px; grid-column: 1/-1; color: var(--text-light);">
                            아직 업로드된 콘텐츠가 없습니다
                        </div>
                    `;
                    return;
                }

                container.innerHTML = items.map(item => {
                    const isVideo = item.file_type === 'video';
                    const mediaHtml = isVideo
                        ? `<video src="${API_URL}/images/${item.image_key}" controls style="width:100%; height:200px; object-fit:cover;"></video>`
                        : `<img src="${API_URL}/images/${item.image_key}" alt="${escapeHtml(item.title || item.filename)}">`;

                    return `
                        <div class="admin-gallery-item">
                            ${mediaHtml}
                            <div class="admin-gallery-item-info">
                                ${item.title ? `<h4>${escapeHtml(item.title)}</h4>` : ''}
                                ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
                                <button class="delete-btn" onclick="deleteImage(${item.id}, '${escapeHtml(item.title || item.filename)}')">삭제</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                document.getElementById('adminGallery').innerHTML = `
                    <div style="text-align:center; padding:40px; grid-column: 1/-1; color: #e74c3c;">
                        갤러리를 불러오는데 실패했습니다
                    </div>
                `;
            }
        }

        // Delete image
        async function deleteImage(id, title) {
            if (!confirm(`"${title}" 이미지를 삭제하시겠습니까?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/images/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${adminPassword}`
                    }
                });

                if (response.status === 401) {
                    showMessage('권한이 없습니다. 올바른 비밀번호로 다시 로그인하세요.', false);
                    setTimeout(logout, 2000);
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    showMessage('이미지가 삭제되었습니다', true);
                    loadAdminGallery();
                } else {
                    showMessage('삭제 실패: ' + (result.error || '알 수 없는 오류'), false);
                }
            } catch (error) {
                showMessage('삭제 중 오류가 발생했습니다: ' + error.message, false);
            }
        }

        function showMessage(text, isSuccess) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            messageDiv.textContent = text;
            setTimeout(() => {
                messageDiv.className = '';
                messageDiv.textContent = '';
            }, 5000);
        }

        function showLoginMessage(text, isSuccess) {
            const messageDiv = document.getElementById('loginMessage');
            messageDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            messageDiv.textContent = text;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
